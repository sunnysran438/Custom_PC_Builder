{% extends 'base.html' %}
{% load static %}

{% block title %}Login - PC Component Builder{% endblock %}

{% block content %}
<section class="loginSection">
  <div class="loginCard">
    <h1>Login</h1>

    {% if error %}
      <p style="color: red; margin-bottom: 16px;">{{ error }}</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="formGroup">
        <label for="login-type">Login As</label>
        <select id="login-type" name="user_type" class="mfrFormSelect">
          <option value="customer">Customer</option>
          <option value="manufacturer">Manufacturer</option>
          <option value="supplier">Supplier</option>
        </select>
      </div>

      <div class="formGroup">
        <label for="login-username">Username or Email</label>
        <input id="login-username" type="text" name="username">
      </div>

      <div class="formGroup">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" name="password">
      </div>

      <div class="loginButtons">
        <button type="submit" class="btnSignin">Sign In</button>
        <a href="{% url 'register' %}">
          <button type="button" class="btnSignup">Sign Up</button>
        </a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
