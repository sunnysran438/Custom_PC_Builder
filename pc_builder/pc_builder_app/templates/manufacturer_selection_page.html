{% extends 'base.html' %}
{% load static %}
 
{% block title %}Manufacturer - PC Component Builder{% endblock %}
 
{% block extra_head %}
<style>
  .mfrFormHidden {
    display: none;
  }
 
  .mfrFormSection {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }
 
  .mfrFormGrid {
    display: grid;
    grid-template-columns: repeat(2, minmax(220px, 1fr));
    gap: 16px 24px;
  }
 
  .mfrFormGroup {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
 
  .mfrFormInput,
  .mfrFormSelect {
    padding: 10px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    font: inherit;
    background: #fff;
  }
 
  .mfrAddBtn {
    margin-top: 20px;
  }
</style>
{% endblock %}

    <h1 style="text-align:center;">Select component</h1>
 
    <div class="formGroup">
      <label for="componentSelect">Components</label>
      <select id="componentSelect" class="mfrFormSelect" >
        <option value="">Select a component</option>
        <option value="cpu">CPU</option>
        <option value="gpu">GPU</option>
        <option value="motherboard">Motherboard</option>
        <option value="ram">RAM</option>
        <option value="storage">Storage</option>

        <option value="fan">Fan</option>
        <option value="ethernet-controller">Ethernet Controller</option>

</section>

{% block scripts %}
<script>
  var componentSelect = document.getElementById('componentSelect');
  var formSection = document.getElementById('mfrFormSection');
  var formTitle = document.getElementById('mfrFormTitle');
  var coolerTypeSelect = document.getElementById('mfrCoolerType');
  var addBtn = document.getElementById('mfrAddBtn');
 
  var componentMap = {
    'cpu': { id: 'mfrFieldsCpu', name: 'CPU' },
    'gpu': { id: 'mfrFieldsGpu', name: 'GPU' },
    'motherboard': { id: 'mfrFieldsMotherboard', name: 'Motherboard' },
    'ram': { id: 'mfrFieldsRam', name: 'RAM' },
    'storage': { id: 'mfrFieldsStorage', name: 'Storage' },
    'psu': { id: 'mfrFieldsPsu', name: 'Power Supply Unit' },
    'case': { id: 'mfrFieldsCase', name: 'Case' },
    'cpu-cooler': { id: 'mfrFieldsCpuCooler', name: 'CPU Cooler' },
    'fan': { id: 'mfrFieldsFan', name: 'Fan' },
    'ethernet-controller': { id: 'mfrFieldsEthernetController', name: 'Ethernet Controller' },
    'wifi-module': { id: 'mfrFieldsWifiModule', name: 'Wifi Module' }
  };
 
  function hideAllComponentFields() {
    var keys = Object.keys(componentMap);
    for (var i = 0; i < keys.length; i++) {
      document.getElementById(componentMap[keys[i]].id).classList.add('mfrFormHidden');
    }
    document.getElementById('mfrFieldsAirCooler').classList.add('mfrFormHidden');
    document.getElementById('mfrFieldsLiquidCooler').classList.add('mfrFormHidden');
  }
 
  componentSelect.addEventListener('change', function () {
      document.getElementById('componentTypeInput').value = this.value;

    var selectedValue = this.value;
    hideAllComponentFields();
 
    if (!selectedValue || !componentMap[selectedValue]) {
      formSection.classList.add('mfrFormHidden');
      return;
    }
 
    formSection.classList.remove('mfrFormHidden');
    formTitle.textContent = componentMap[selectedValue].name;
    document.getElementById(componentMap[selectedValue].id).classList.remove('mfrFormHidden');
  });
 
  coolerTypeSelect.addEventListener('change', function () {
      document.getElementById('componentTypeInput').value = this.value;

    var airFields = document.getElementById('mfrFieldsAirCooler');
    var liquidFields = document.getElementById('mfrFieldsLiquidCooler');
 
    airFields.classList.add('mfrFormHidden');
    liquidFields.classList.add('mfrFormHidden');
 
    if (this.value === 'air') {
      airFields.classList.remove('mfrFormHidden');
    } else if (this.value === 'liquid') {
      liquidFields.classList.remove('mfrFormHidden');
    }
  });
 
  addBtn.addEventListener('click', function () {
    alert('Component added successfully!');
  });
</script>
{% endblock %}
