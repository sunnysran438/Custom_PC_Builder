{% extends 'base.html' %}
{% load static %}

{% block title %}Manufacturer - PC Component Builder{% endblock %}

{% block extra_head %}
<style>
  .mfrFormHidden {
    display: none;
  }

  .mfrFormSection {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .mfrFormGrid {
    display: grid;
    grid-template-columns: repeat(2, minmax(220px, 1fr));
    gap: 16px 24px;
  }

  .mfrFormGroup {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .mfrFormInput,
  .mfrFormSelect {
    padding: 10px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    font: inherit;
    background: #fff;
  }

  .mfrAddBtn {
    margin-top: 20px;
  }
</style>
{% endblock %}

{% block content %}
<section class="loginSection">
  <div class="loginCard">
    <h1 style="text-align:center;">Select component</h1>

    <div class="formGroup">
      <label for="componentSelect">Components</label>
      <select id="componentSelect" class="mfrFormSelect">
        <option value="">Select a component</option>
        <option value="cpu">CPU</option>
        <option value="gpu">GPU</option>
        <option value="motherboard">Motherboard</option>
        <option value="ram">RAM</option>
        <option value="storage">Storage</option>
        <option value="psu">Power Supply Unit</option>
        <option value="case">Case</option>
        <option value="cpu-cooler">CPU Cooler</option>
        <option value="fan">Fan</option>
        <option value="ethernet-controller">Ethernet Controller</option>
        <option value="wifi-module">Wifi Module</option>
      </select>
    </div>
  </div>
</section>

<section class="mfrFormSection mfrFormHidden" id="mfrFormSection">
  <h1 class="mfrFormTitle" id="mfrFormTitle">Component</h1>

  <div id="mfrSharedFields" class="mfrFormGrid">
    <div class="mfrFormGroup">
      <label>Product Name</label>
      <input type="text" class="mfrFormInput" placeholder="Enter product name">
    </div>
  </div>

  <div id="mfrFieldsCpu" class="mfrFormHidden">

      <div class="mfrFormGroup"><label>Number of Threads</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Base Clock</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Boost Clock</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>L2 Cache</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>L3 Cache</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>TDP</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Architecture</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Chip Family</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Series</label><select class="mfrFormSelect"><option>Select option</option></select></div>
    </div>
  </div>

  <div id="mfrFieldsGpu" class="mfrFormHidden">
    <div class="mfrFormGrid">
      <div class="mfrFormGroup"><label>Interface</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Series</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Architecture</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Base Clock</label><select class="mfrFormSelect"><option>Select option</option></select></div>
      <div class="mfrFormGroup"><label>Boost Clock</label><select class="mfrFormSelect"><option>Select option</option></select></div>

        <select class="mfrFormSelect" id="mfrStorageType">

  <button class="mfrAddBtn" id="mfrAddBtn" type="button">Add</button>

{% block scripts %}
<script>
  const componentSelect = document.getElementById('componentSelect');
  const formSection = document.getElementById('mfrFormSection');
  const formTitle = document.getElementById('mfrFormTitle');
  const coolerTypeSelect = document.getElementById('mfrCoolerType');
  const addBtn = document.getElementById('mfrAddBtn');

  const componentMap = {
    'cpu': { id: 'mfrFieldsCpu', name: 'CPU' },
    'gpu': { id: 'mfrFieldsGpu', name: 'GPU' },
    'motherboard': { id: 'mfrFieldsMotherboard', name: 'Motherboard' },
    'ram': { id: 'mfrFieldsRam', name: 'RAM' },
    'storage': { id: 'mfrFieldsStorage', name: 'Storage' },
    'psu': { id: 'mfrFieldsPsu', name: 'Power Supply Unit' },
    'case': { id: 'mfrFieldsCase', name: 'Case' },
    'cpu-cooler': { id: 'mfrFieldsCpuCooler', name: 'CPU Cooler' },
    'fan': { id: 'mfrFieldsFan', name: 'Fan' },
    'ethernet-controller': { id: 'mfrFieldsEthernetController', name: 'Ethernet Controller' },
    'wifi-module': { id: 'mfrFieldsWifiModule', name: 'Wifi Module' }
  };

  function hideAllComponentFields() {
    Object.values(componentMap).forEach(item => {
      document.getElementById(item.id).classList.add('mfrFormHidden');
    });

    document.getElementById('mfrFieldsAirCooler').classList.add('mfrFormHidden');
    document.getElementById('mfrFieldsLiquidCooler').classList.add('mfrFormHidden');
  }

  componentSelect.addEventListener('change', function () {
    const selectedValue = this.value;

    hideAllComponentFields();

    if (!selectedValue || !componentMap[selectedValue]) {
      formSection.classList.add('mfrFormHidden');
      return;
    }

    formSection.classList.remove('mfrFormHidden');
    formTitle.textContent = componentMap[selectedValue].name;
    document.getElementById(componentMap[selectedValue].id).classList.remove('mfrFormHidden');
  });

  coolerTypeSelect.addEventListener('change', function () {
    const airFields = document.getElementById('mfrFieldsAirCooler');
    const liquidFields = document.getElementById('mfrFieldsLiquidCooler');

    airFields.classList.add('mfrFormHidden');
    liquidFields.classList.add('mfrFormHidden');

    if (this.value === 'air') {
      airFields.classList.remove('mfrFormHidden');
    } else if (this.value === 'liquid') {
      liquidFields.classList.remove('mfrFormHidden');
    }
  });

  addBtn.addEventListener('click', function () {
    alert('Component added successfully!');
  });
</script>
{% endblock %}
